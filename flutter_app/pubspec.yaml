name: integrated_life_manager
description: Integrated Life Manager - Your personal life optimization system
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & networking
  dio: ^5.7.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Health Connect (reads Amazfit data via Health Connect)
  health: ^13.0.0

  # Screen time (Android UsageStatsManager)
  app_usage: ^4.0.1

  # Background sync
  workmanager: ^0.9.0

  # Local notifications (offline reminder fallback)
  flutter_local_notifications: ^17.2.4

  # Firebase (push notifications)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Local cache (offline queue)
  hive_flutter: ^1.1.0

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.2

  # Charts
  fl_chart: ^0.68.0

  # Markdown rendering
  flutter_markdown: ^0.7.3

  # UUID generation (chat session IDs)
  uuid: ^4.4.0

  # Voice input (uses Android's built-in speech recognizer — no extra cost)
  speech_to_text: ^7.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
